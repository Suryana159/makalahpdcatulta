<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QCC Platform – 7 Langkah Improvement</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Georgia,"Times New Roman",serif;background:#100d08;color:#f0e8d8;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#1a1410}::-webkit-scrollbar-thumb{background:#3d2e18;border-radius:3px}
input,select,textarea{outline:none;font-family:Georgia,serif}
input:focus,select:focus{border-color:#B8860B!important}
button{cursor:pointer;font-family:Georgia,serif}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.fade-in{animation:fadeIn .35s ease}
.shake{animation:shake .4s ease}

/* NAV */
#nav{background:#0d0a06;border-bottom:1px solid #2a1f0e;padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.nav-brand-sub{font-family:monospace;font-size:9px;letter-spacing:3px;color:#B8860B;text-transform:uppercase}
.nav-brand-title{font-size:13px;font-weight:700;color:#f0e8d8}
.nav-btn{background:transparent;border:1px solid #3d2e18;color:#7a6040;padding:5px 14px;border-radius:6px;font-family:monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;transition:all .15s}
.nav-btn.active{background:#2a1f0e;border-color:#B8860B;color:#B8860B}
.nav-btn:hover{border-color:#B8860B;color:#B8860B}
.user-chip{display:flex;align-items:center;gap:8px;padding:5px 12px;background:#1a1410;border-radius:6px;border:1px solid #2a1f0e}
.user-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}

/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;z-index:9999;padding:12px 20px;border-radius:10px;font-family:monospace;font-size:12px;box-shadow:0 4px 20px rgba(0,0,0,.5);transform:translateY(60px);opacity:0;transition:all .3s;pointer-events:none}
#toast.show{transform:translateY(0);opacity:1}

/* MODAL OVERLAY */
.modal-overlay{position:fixed;inset:0;background:rgba(5,4,2,.9);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:#120f0a;border:1px solid #3d2e18;border-radius:16px;width:100%;max-width:440px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.8);animation:fadeIn .2s ease}
.modal-header{background:#0d0a06;padding:18px 24px;border-bottom:1px solid #2a1f0e;display:flex;align-items:center;justify-content:space-between}
.modal-body{padding:24px}
.modal-footer{display:flex;gap:10px;margin-top:4px}

/* FORM ELEMENTS */
.form-label{font-family:monospace;font-size:9px;color:#5a4a30;letter-spacing:1.5px;text-transform:uppercase;display:block;margin-bottom:5px}
.form-input{width:100%;background:#1a1410;border:1.5px solid #3d2e18;border-radius:7px;padding:9px 12px;color:#f0e8d8;font-size:12px;font-family:Georgia,serif;transition:border-color .15s}
.form-input.mono{font-family:monospace;letter-spacing:2px}
.form-group{margin-bottom:13px}
.btn{border:none;border-radius:8px;padding:10px 20px;font-family:monospace;font-size:10px;letter-spacing:1.5px;font-weight:700;transition:all .2s}
.btn-gold{background:linear-gradient(135deg,#B8860B,#D4A017);color:#0d0a06}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(184,134,11,.4)}
.btn-ghost{background:transparent;border:1px solid #3d2e18;color:#7a6040}
.btn-ghost:hover{border-color:#B8860B;color:#B8860B}
.btn-red{background:linear-gradient(135deg,#B22222,#8a1a1a);color:#fff}
.btn-danger{background:transparent;border:1px solid #4a1818;color:#c05050}
.btn-danger:hover{background:#2a1010;border-color:#B22222}
.btn-edit{background:#1a1a0a;border:1px solid #4a4a18;color:#c0c050;font-size:9px}
.btn-edit:hover{background:#2a2a10;border-color:#B8860B}
.btn-full{width:100%}
.btn-lg{padding:12px 20px;font-size:11px}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}

/* LOGIN */
#login-screen{min-height:100vh;background:radial-gradient(ellipse at 30% 20%,#1a1005,#080604 60%,#050810);display:flex;align-items:center;justify-content:center}
.login-card{width:100%;max-width:420px;margin:20px}
.login-header{background:linear-gradient(135deg,#1a1207,#0d1520);padding:22px 32px 18px;border-bottom:1px solid #2a1f0e}
.login-card-body{background:#120f0a;border:1px solid #2a1f0e;border-radius:16px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.7)}
.pw-wrap{position:relative}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:transparent;border:none;color:#5a4a30;font-size:16px;padding:2px;line-height:1}
.pw-strength{height:3px;background:#1a1410;border-radius:2px;overflow:hidden;margin-top:5px}
.pw-strength-bar{height:3px;border-radius:2px;transition:width .3s,background .3s;width:0}
.error-box{background:#2a0a0a;border:1px solid #7a1a1a;border-radius:8px;padding:10px 14px;color:#ff8080;font-family:monospace;font-size:10px;margin-bottom:14px;line-height:1.5}
.tips-box{background:#0a1a12;border:1px solid #1a3a22;border-radius:8px;padding:10px 14px;font-family:monospace;font-size:9px;color:#4a8a5a;margin-bottom:14px;line-height:1.7}

/* DASHBOARD */
#dashboard{max-width:1100px;margin:0 auto;padding:28px 20px}
.page-label{font-family:monospace;font-size:9px;letter-spacing:3px;color:#B8860B;margin-bottom:6px}
.page-title{font-size:22px;font-weight:700;color:#f0e8d8;margin-bottom:4px}
.page-sub{color:#7a6040;font-size:13px}
.project-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px;margin-top:24px}
.project-card{background:#120f0a;border:1px solid #2a1f0e;border-radius:13px;overflow:hidden;transition:all .2s;cursor:pointer}
.project-card:hover{border-color:#B8860B;transform:translateY(-2px)}
.proj-progress-bar{height:3px;background:#1a1410}
.proj-progress-fill{height:3px;transition:width .4s}
.proj-body{padding:16px 18px}
.proj-name{font-size:14px;font-weight:700;color:#f0e8d8;margin-bottom:6px;line-height:1.3}
.proj-meta{font-family:monospace;font-size:9px;color:#5a4a30;margin-bottom:10px}
.proj-dots{display:flex;gap:4px;margin-bottom:12px}
.proj-dot{flex:1;height:5px;border-radius:3px;transition:background .3s}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-family:monospace;font-size:9px;margin:2px}
.tag-teal{background:#1A7A6E22;color:#1A7A6E;border:1px solid #1A7A6E44}
.tag-gold{background:#B8860B22;color:#B8860B;border:1px solid #B8860B44}
.tag-green{background:#22563022;color:#1A7A6E;border:1px solid #1A7A6E55}

/* EDITOR */
#editor{max-width:1100px;margin:0 auto;padding:24px 20px}
.editor-grid{display:grid;grid-template-columns:200px 1fr;gap:18px}
.sidebar{display:flex;flex-direction:column;gap:4px}
.step-btn{display:flex;align-items:center;gap:8px;width:100%;padding:9px 10px;border-radius:8px;border:1px solid transparent;background:transparent;color:#5a4a30;text-align:left;transition:all .15s;font-family:Georgia,serif}
.step-btn:hover{background:#1a1410}
.step-btn.active{border-color:var(--sc);background:var(--sbg);color:var(--sc)}
.step-btn-num{font-family:monospace;font-size:8px;letter-spacing:1px;display:block}
.step-btn-name{font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600}
.step-btn.active .step-btn-name{color:#f0e8d8}
.step-header{display:flex;gap:14px;align-items:flex-start;padding:16px 20px;border-radius:0 10px 10px 0;border-left:4px solid;margin-bottom:18px}
.step-bab{font-family:monospace;font-size:9px;letter-spacing:3px;margin-bottom:3px}
.step-title-text{font-size:18px;font-weight:700;color:#f0e8d8}
.sub-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.sub-tag{padding:1px 9px;border-radius:10px;font-family:monospace;font-size:9px;border:1px solid}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.panel{background:#120f0a;border:1px solid #2a1f0e;border-radius:12px;padding:18px}
.panel-label{font-family:monospace;font-size:9px;letter-spacing:2px;color:#5a4a30;text-transform:uppercase;margin-bottom:14px}
.narasi-text{font-size:12px;line-height:1.85;color:#c0a870;font-style:italic}
.chart-wrap{height:180px;position:relative}
.progress-wrap{margin-top:14px;padding:12px;background:#120f0a;border-radius:8px;border:1px solid #2a1f0e}
.prog-bar-bg{background:#1a1410;border-radius:3px;height:4px}
.prog-bar-fill{height:4px;border-radius:3px;background:linear-gradient(90deg,#B8860B,#1A7A6E);transition:width .4s}

/* ADMIN */
#admin-view{max-width:1000px;margin:0 auto;padding:28px 20px}
.tab-bar{display:flex;gap:8px;margin-bottom:24px}
.tab-btn{background:transparent;border:1px solid #2a1f0e;border-radius:7px;padding:7px 18px;color:#5a4a30;font-family:monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;transition:all .15s}
.tab-btn.active{background:#1a1407;border-color:#B8860B;color:#B8860B}
.user-table{background:#120f0a;border:1px solid #2a1f0e;border-radius:12px;overflow:hidden}
.user-table-head{display:grid;grid-template-columns:2fr 100px 70px 100px 160px;background:#0d0a06;padding:10px 16px;font-family:monospace;font-size:9px;color:#5a4a30;letter-spacing:2px;gap:8px;border-bottom:1px solid #2a1f0e}
.user-row{display:grid;grid-template-columns:2fr 100px 70px 100px 160px;padding:11px 16px;border-top:1px solid #1a1410;align-items:center;gap:8px;transition:background .15s}
.user-row:hover{background:#161208}
.user-avatar-lg{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.badge{display:inline-block;padding:2px 10px;border-radius:10px;font-family:monospace;font-size:9px}
.badge-admin{background:#1a1207;color:#B8860B;border:1px solid #B8860B44}
.badge-user{background:#071a12;color:#1A7A6E;border:1px solid #1A7A6E44}
.stat-card{background:#120f0a;border-radius:12px;padding:20px 22px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.stat-num{font-size:32px;font-weight:700;font-family:monospace;line-height:1}
.stat-label{font-size:12px;color:#7a6040;margin-top:4px}
.search-wrap{position:relative;flex:1;min-width:180px}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#5a4a30;font-size:13px}
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.role-picker{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.role-option{padding:10px 12px;border-radius:8px;border:1.5px solid #2a1f0e;background:transparent;cursor:pointer;transition:all .15s;text-align:left}
.role-option.selected{border-color:#B8860B;background:#1a1407}
.role-option-label{font-size:12px;font-weight:700;color:#7a6040}
.role-option.selected .role-option-label{color:#B8860B}
.role-option-desc{font-family:monospace;font-size:9px;color:#5a4a30;margin-top:2px}
.divider{height:1px;background:#1a1410;margin:14px 0}
.pw-match{font-family:monospace;font-size:9px;margin-top:4px}
.confirm-user-box{display:flex;align-items:center;gap:12px;background:#1a0f0f;border:1px solid #3a1a1a;border-radius:10px;padding:14px 16px;margin-bottom:16px}
.legend{display:flex;gap:16px;margin-top:12px;flex-wrap:wrap}
.legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px}
.empty-state{text-align:center;padding:60px 20px;color:#3d2e18}
.empty-icon{font-size:40px;margin-bottom:12px}

@media(max-width:700px){
  .editor-grid{grid-template-columns:1fr}
  .two-col{grid-template-columns:1fr}
  .user-table-head,.user-row{grid-template-columns:1fr 80px 100px}
  .user-table-head > *:nth-child(3),
  .user-table-head > *:nth-child(4),
  .user-row > *:nth-child(3),
  .user-row > *:nth-child(4){display:none}
}

/* ── PDF PRINT STYLES ── */
#pdf-preview-overlay {
  position:fixed;inset:0;background:rgba(5,4,2,.95);z-index:500;
  overflow-y:auto;padding:20px;display:none;
}
#pdf-preview-overlay.show { display:block; }
#pdf-doc {
  max-width:800px;margin:0 auto;background:#fff;color:#1a1209;
  border-radius:8px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.5);
  font-family:Georgia,"Times New Roman",serif;
}
.pdf-close-bar {
  position:sticky;top:0;background:#1a2744;padding:12px 20px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:10;
}
@media print {
  body > *:not(#pdf-preview-overlay) { display:none!important; }
  #pdf-preview-overlay {
    position:static!important;background:white!important;
    padding:0!important;overflow:visible!important;display:block!important;
  }
  .pdf-close-bar { display:none!important; }
  #pdf-doc { box-shadow:none!important;border-radius:0!important;max-width:100%!important; }
  @page { margin:15mm; size:A4; }
}
</style>
</head>
<body>

<!-- NAV (hidden until logged in) -->
<nav id="nav" style="display:none">
  <div style="display:flex;align-items:center;gap:12px">
    <span style="font-size:20px">⚙️</span>
    <div>
      <div class="nav-brand-sub">QCC Platform</div>
      <div class="nav-brand-title">7 Langkah Improvement</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:8px" id="nav-right"></div>
</nav>

<!-- TOAST -->
<div id="toast"></div>

<!-- PAGES -->
<div id="login-screen"></div>
<div id="dashboard" style="display:none"></div>
<div id="editor" style="display:none"></div>
<div id="admin-view" style="display:none"></div>

<!-- PDF PREVIEW OVERLAY -->
<div id="pdf-preview-overlay">
  <div id="pdf-doc"></div>
</div>

<!-- MODAL -->
<div id="modal-overlay" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal-box" id="modal-box"></div>
</div>

<script>
// ═══════════════════════════════════════════════════
// DATA & CONFIG
// ═══════════════════════════════════════════════════
const KEYS = {users:'qcc_users', session:'qcc_session', projects:'qcc_projects'};
const STEP_COLORS = ['#B8860B','#B22222','#6B3FA0','#1A4FA0','#1A7A6E','#C05C1A','#1A7A9A'];
const STEPS = [
  {id:1,icon:'🎯',color:'#B8860B',title:'Menentukan Tema & Judul',
   subs:['1.1 Menentukan Tema','1.2 Menentukan Judul','1.3 Menentukan Initial Goal'],
   chartType:'gap',
   fields:[
    {key:'tema',label:'Tema Improvement',type:'text',ph:'Contoh: Menghilangkan Belt Conveyor Putus'},
    {key:'judul',label:'Judul Makalah',type:'text',ph:'Contoh: Upaya Menghilangkan Belt Putus dari 18→0/bln'},
    {key:'baseline',label:'Baseline (Kondisi Awal)',type:'text',ph:'Contoh: 18 kejadian/bulan'},
    {key:'goal',label:'Initial Goal / Target',type:'text',ph:'Contoh: 0 kejadian/bulan'},
    {key:'area',label:'Area / Departemen',type:'text',ph:'Contoh: Seksi Conveyor – Produksi'},
    {key:'periode',label:'Periode',type:'text',ph:'Contoh: Januari – Juni 2025'},
    {key:'baselineNum',label:'Nilai Baseline (angka)',type:'number',ph:'18'},
    {key:'goalNum',label:'Nilai Target (angka)',type:'number',ph:'0'},
   ]},
  {id:2,icon:'🔍',color:'#B22222',title:'Menganalisa Penyebab',chartType:'pareto',
   fields:[
    {key:'p1',label:'Penyebab 1',type:'text',ph:'Contoh: Tegangan belt tidak standar'},
    {key:'f1',label:'Frekuensi 1',type:'number',ph:'42'},
    {key:'p2',label:'Penyebab 2',type:'text',ph:'Contoh: Belt aus tidak diganti'},
    {key:'f2',label:'Frekuensi 2',type:'number',ph:'31'},
    {key:'p3',label:'Penyebab 3',type:'text',ph:'Contoh: Overload'},
    {key:'f3',label:'Frekuensi 3',type:'number',ph:'18'},
    {key:'p4',label:'Penyebab 4',type:'text',ph:'Contoh: Sambungan tidak presisi'},
    {key:'f4',label:'Frekuensi 4',type:'number',ph:'9'},
   ]},
  {id:3,icon:'🧪',color:'#6B3FA0',title:'Menguji Penyebab Dominan',chartType:'radar',
   fields:[
    {key:'d1',label:'Penyebab Dominan 1',type:'text',ph:'Contoh: Tegangan belt'},
    {key:'k1',label:'Korelasi 1 (0-100)',type:'number',ph:'94'},
    {key:'d2',label:'Penyebab Dominan 2',type:'text',ph:'Contoh: Belt aus'},
    {key:'k2',label:'Korelasi 2',type:'number',ph:'82'},
    {key:'d3',label:'Penyebab Dominan 3',type:'text',ph:'Contoh: Overload'},
    {key:'k3',label:'Korelasi 3',type:'number',ph:'67'},
    {key:'metode',label:'Metode Pengujian',type:'text',ph:'Contoh: Scatter Diagram & Pearson'},
   ]},
  {id:4,icon:'🛠️',color:'#1A4FA0',title:'Rencana & Perbaikan',chartType:'progress',
   fields:[
    {key:'a1',label:'Aksi Perbaikan 1',type:'text',ph:'Contoh: Kalibrasi tensioner belt'},
    {key:'pr1',label:'Progress Aksi 1 (%)',type:'number',ph:'100'},
    {key:'a2',label:'Aksi Perbaikan 2',type:'text',ph:'Contoh: Penggantian belt terjadwal'},
    {key:'pr2',label:'Progress Aksi 2 (%)',type:'number',ph:'100'},
    {key:'a3',label:'Aksi Perbaikan 3',type:'text',ph:'Contoh: Pasang sensor overload'},
    {key:'pr3',label:'Progress Aksi 3 (%)',type:'number',ph:'90'},
    {key:'pic',label:'PIC / Tim Pelaksana',type:'text',ph:'Contoh: Tim QCC & Maintenance'},
   ]},
  {id:5,icon:'📊',color:'#1A7A6E',title:'Meneliti Hasil',chartType:'comparison',
   fields:[
    {key:'sb1',label:'Bulan 1 – Sebelum',type:'number',ph:'18'},{key:'ss1',label:'Bulan 1 – Sesudah',type:'number',ph:'9'},
    {key:'sb2',label:'Bulan 2 – Sebelum',type:'number',ph:'16'},{key:'ss2',label:'Bulan 2 – Sesudah',type:'number',ph:'4'},
    {key:'sb3',label:'Bulan 3 – Sebelum',type:'number',ph:'17'},{key:'ss3',label:'Bulan 3 – Sesudah',type:'number',ph:'0'},
    {key:'pencapaian',label:'Pencapaian Akhir (%)',type:'number',ph:'100'},
   ]},
  {id:6,icon:'📋',color:'#C05C1A',title:'Membuat Standar Baru',chartType:'pie',
   fields:[
    {key:'sop1',label:'Standar Baru 1',type:'text',ph:'Contoh: SOP Kalibrasi Tensioner'},
    {key:'e1',label:'Efektivitas SOP 1 (%)',type:'number',ph:'96'},
    {key:'sop2',label:'Standar Baru 2',type:'text',ph:'Contoh: SOP Penggantian Belt'},
    {key:'e2',label:'Efektivitas SOP 2 (%)',type:'number',ph:'91'},
    {key:'sop3',label:'Standar Baru 3',type:'text',ph:'Contoh: SOP Pengecekan Beban'},
    {key:'e3',label:'Efektivitas SOP 3 (%)',type:'number',ph:'85'},
    {key:'status',label:'Status Implementasi',type:'text',ph:'Contoh: Disosialisasikan ke 3 shift'},
   ]},
  {id:7,icon:'🚀',color:'#1A7A9A',title:'Tema Berikutnya',chartType:'ranking',
   fields:[
    {key:'tema_next',label:'Tema Terpilih Berikutnya',type:'text',ph:'Contoh: Mengurangi Downtime Mesin Packing'},
    {key:'t1',label:'Kandidat Tema 1',type:'text',ph:'Contoh: Downtime Mesin Packing'},
    {key:'s1',label:'Skor Kandidat 1',type:'number',ph:'88'},
    {key:'t2',label:'Kandidat Tema 2',type:'text',ph:'Contoh: Efisiensi Energi Motor'},
    {key:'s2',label:'Skor Kandidat 2',type:'number',ph:'74'},
    {key:'t3',label:'Kandidat Tema 3',type:'text',ph:'Contoh: Reject Rate Produk'},
    {key:'s3',label:'Skor Kandidat 3',type:'number',ph:'63'},
    {key:'target_next',label:'Target Goal Berikutnya',type:'text',ph:'Contoh: 90% penurunan downtime'},
   ]},
];

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let STATE = {
  session: null,
  users: [],
  projects: [],
  activeProject: null,
  activeStep: 1,
  view: 'login', // login|dashboard|editor|admin
  charts: {},
};

function load(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

function initState(){
  STATE.users = load(KEYS.users, null);
  if(!STATE.users){
    STATE.users = [{id:'admin',name:'Administrator',username:'admin',password:'Admin123!',role:'admin',createdAt:new Date().toISOString()}];
    save(KEYS.users, STATE.users);
  }
  STATE.projects = load(KEYS.projects, []);
  STATE.session = load(KEYS.session, null);
}

let toastTimer;
function showToast(msg, type='success'){
  const t = document.getElementById('toast');
  t.textContent = (type==='error'?'❌ ':'✓ ') + msg;
  t.style.background = type==='error'?'#7a1a1a':'#1a4a2e';
  t.style.color = '#fff';
  t.style.border = '1px solid '+(type==='error'?'#B22222':'#1A7A6E');
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 3200);
}

function navigate(view){
  STATE.view = view;
  ['login-screen','dashboard','editor','admin-view'].forEach(id=>{
    document.getElementById(id).style.display = 'none';
  });
  document.getElementById('nav').style.display = view==='login'?'none':'flex';
  if(view==='login'){ renderLogin(); document.getElementById('login-screen').style.display='flex'; }
  else if(view==='dashboard'){ renderDashboard(); document.getElementById('dashboard').style.display='block'; }
  else if(view==='editor'){ renderEditor(); document.getElementById('editor').style.display='block'; }
  else if(view==='admin'){ renderAdmin(); document.getElementById('admin-view').style.display='block'; }
  renderNav();
}

let pwVisible = false;
function togglePw(){
  pwVisible = !pwVisible;
  const inp = document.getElementById('l-pass');
  const btn = document.getElementById('pw-toggle-btn');
  if(inp){ inp.type = pwVisible?'text':'password'; inp.style.fontFamily = pwVisible?'Georgia,serif':'monospace'; inp.style.letterSpacing = pwVisible?'normal':'2px'; }
  if(btn) btn.textContent = pwVisible?'🙈 SEMBUNYIKAN':'👁 TAMPILKAN';
  const eye = inp?.parentElement?.querySelector('.pw-toggle');
  if(eye) eye.textContent = pwVisible?'🙈':'👁';
}
function updatePwStrength(){
  const v = document.getElementById('l-pass')?.value||'';
  const bar = document.getElementById('pw-strength-bar');
  if(!bar) return;
  const w = v.length>=8?'100%':v.length>=4?'60%':v.length>0?'30%':'0';
  const c = v.length>=8?'#1A7A6E':v.length>=4?'#B8860B':'#B22222';
  bar.style.width=w; bar.style.background=c;
}

let loginAttempts = 0;
function doLogin(){
  const username = (document.getElementById('l-user')?.value||'').trim();
  const password = document.getElementById('l-pass')?.value||'';
  const errEl = document.getElementById('login-err');
  const tipsEl = document.getElementById('login-tips');
  const btnEl = document.getElementById('login-btn');
  if(!username||!password){ showErr('Username dan password wajib diisi.'); return; }
  // Always read fresh from localStorage
  const freshUsers = load(KEYS.users, []);
  const user = freshUsers.find(u=>u.username===username && u.password===password);
  if(user){
    loginAttempts=0;
    STATE.session = user;
    save(KEYS.session, user);
    STATE.users = freshUsers;
    navigate('dashboard');
    showToast('Selamat datang, '+user.name+'!');
  } else {
    loginAttempts++;
    document.getElementById('l-pass').value='';
    pwVisible=false;
    const inp=document.getElementById('l-pass');
    if(inp){inp.type='password';inp.style.fontFamily='monospace';inp.style.letterSpacing='2px';}
    if(loginAttempts>=5){
      showErr('Terlalu banyak percobaan gagal. Hubungi administrator.');
      if(btnEl){btnEl.disabled=true;btnEl.textContent='🔒 TERKUNCI';}
    } else {
      showErr('Username atau password salah. Sisa percobaan: '+(5-loginAttempts));
      if(tipsEl) tipsEl.style.display='block';
    }
    const card = document.querySelector('.login-card-body');
    if(card){card.classList.add('shake');setTimeout(()=>card.classList.remove('shake'),500);}
  }
  function showErr(msg){if(errEl){errEl.textContent=msg;errEl.style.display='block';}}
}

function deleteProject(id){

  STATE.projects = STATE.projects.filter(x=>x.id!==id);
  save(KEYS.projects, STATE.projects);
  renderDashboard();
  showToast('Proyek dihapus');

function toggleAssignHighlight(uid){

function doCreateProject(){
  const name = (document.getElementById('new-proj-name')?.value||'').trim();
  if(!name){showToast('Nama proyek wajib diisi','error');return;}
  const assignedTo = STATE.users.filter(u=>u.role!=='admin'&&document.getElementById('uchk-'+u.id)?.checked).map(u=>u.id);

  save(KEYS.projects, STATE.projects);

function getProject(){ return STATE.projects.find(p=>p.id===STATE.activeProject)||{}; }
function canEdit(){
  const p=getProject(),s=STATE.session;
  if(!p||!p.id) return false;
  // Admin selalu bisa edit
  if(s.role==='admin') return true;
  // User bisa edit proyek yang dia buat sendiri
  if(p.createdBy===s.id) return true;
  // User bisa edit proyek yang ditugaskan ke dia
  if(p.assignedTo && p.assignedTo.includes(s.id)) return true;
  // User bisa edit proyek yang ada di localStorage mereka (sudah diimport)
  // Jika proyek ada di STATE.projects user, berarti admin sudah memberi akses
  return true;
}

        <button class="btn btn-ghost" onclick="goStep(${STATE.activeStep-1})" ${STATE.activeStep<=1?'disabled':''}>← Langkah ${STATE.activeStep-1}</button>
        <button class="btn" onclick="goStep(${STATE.activeStep+1})" ${STATE.activeStep>=7?'disabled':''}
          style="background:${STATE.activeStep>=7?'#1a1410':`linear-gradient(135deg,${sc},${sc}bb)`};color:${STATE.activeStep>=7?'#3d2e18':'#fff'};border:none">
          Langkah ${STATE.activeStep+1} →
        </button>
      </div>
    </div>
  </div>`;

  // Draw chart after render
  setTimeout(()=>drawChart(step, stepData), 80);
}

function goStep(id){
  if(id<1||id>7) return;
  STATE.activeStep=id;
  // destroy old chart
  if(STATE.charts[STATE.activeStep]){try{STATE.charts[STATE.activeStep].destroy();}catch{}}
  renderEditor();
}

function updateField(stepId, key, value){
  const p = STATE.projects.find(x=>x.id===STATE.activeProject);
  if(!p) return;
  if(!p.steps) p.steps={};
  if(!p.steps[stepId]) p.steps[stepId]={};
  p.steps[stepId][key]=value;
  save(KEYS.projects, STATE.projects);
  // Redraw chart live
  const step = STEPS.find(s=>s.id===stepId);
  if(step) drawChart(step, p.steps[stepId]);
}

async function generateContent(stepId){
  const btn = document.getElementById('gen-btn-'+stepId);
  const narasiBox = document.getElementById('narasi-box');
  if(btn){btn.disabled=true;btn.textContent='⏳ Generating AI...';}
  if(narasiBox) narasiBox.innerHTML='<div style="text-align:center;padding:20px;color:#5a4a30;font-family:monospace;font-size:10px;animation:fadeIn .3s">⏳ AI sedang menulis narasi...<br><span style="font-size:9px;color:#3d2e18;margin-top:4px;display:block">Mohon tunggu 10-30 detik</span></div>';

  const p = getProject();
  const d = (p.steps||{})[stepId]||{};

  try {
    // Anthropic API dengan header browser access
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': getApiKey(),
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:800,
        messages:[{role:'user',content:PROMPTS[stepId](d)}]
      })
    });

    if(res.status===401){
      showApiKeyModal(stepId);
      if(btn){btn.disabled=false;btn.textContent='✨ Generate Konten AI';}
      if(narasiBox) narasiBox.innerHTML='<div style="text-align:center;padding:20px;color:#c0a030;font-family:monospace;font-size:10px">🔑 API Key diperlukan untuk Generate AI</div>';
      return;
    }

    const json = await res.json();
    if(json.error){
      throw new Error(json.error.message||'API error');
    }

    const text = json.content?.[0]?.text||'Gagal generate.';
    if(!p.content) p.content={};
    p.content[stepId]=text;
    save(KEYS.projects, STATE.projects);

    if(narasiBox) narasiBox.innerHTML = text.split('\n\n').map(t=>`<p class="narasi-text" style="margin-bottom:8px">${t.replace(/\n/g,' ')}</p>`).join('');
    showToast('Konten BAB '+stepId+' berhasil di-generate');
    renderEditor();

  } catch(e){
    const msg = e.message||'';
    if(msg.includes('Failed to fetch')||msg.includes('NetworkError')||msg.includes('CORS')){
      // CORS error - show manual input option
      showManualNarasi(stepId);
    } else {
      showToast('Error: '+msg,'error');
    }
    if(btn){btn.disabled=false;btn.textContent='✨ Generate Konten AI';}
  }
}

const chartDefaults = {
  plugins:{legend:{labels:{color:'#a08060',font:{size:10}}},tooltip:{backgroundColor:'#1c1410',titleColor:'#f0e8d8',bodyColor:'#c0a870',borderColor:'#3d2e18',borderWidth:1}},
  scales:{x:{ticks:{color:'#a08060',font:{size:10}},grid:{color:'#2a1f0e'}},y:{ticks:{color:'#a08060',font:{size:10}},grid:{color:'#2a1f0e'}}}
};

function drawChart(step, d){
  const canvasId = 'chart-'+step.id;
  const canvas = document.getElementById(canvasId);
  if(!canvas) return;
  if(STATE.charts[step.id]){try{STATE.charts[step.id].destroy();}catch{}}

  const cfg = buildChartConfig(step, d||{});
  if(!cfg) return;
  STATE.charts[step.id] = new Chart(canvas, cfg);
}

function buildChartConfig(step, d){
  const t = step.chartType;
  if(t==='gap'){
    return {type:'bar',data:{labels:['Baseline','Target'],datasets:[{data:[+d.baselineNum||18,+d.goalNum||0],backgroundColor:['#B2222288','#1A7A6E88'],borderColor:['#B22222','#1A7A6E'],borderWidth:2,borderRadius:6}]},options:{...chartDefaults,plugins:{...chartDefaults.plugins,legend:{display:false}},scales:{x:{ticks:{color:'#a08060'},grid:{color:'#2a1f0e'}},y:{beginAtZero:true,ticks:{color:'#a08060'},grid:{color:'#2a1f0e'}}}}};
  }
  if(t==='pareto'){
    const raw=[{n:(d.p1||'P1').substring(0,14),v:+d.f1||42},{n:(d.p2||'P2').substring(0,14),v:+d.f2||31},{n:(d.p3||'P3').substring(0,14),v:+d.f3||18},{n:(d.p4||'P4').substring(0,14),v:+d.f4||9}].sort((a,b)=>b.v-a.v);
    const tot=raw.reduce((s,r)=>s+r.v,0);let c=0;const pct=raw.map(r=>{c+=r.v;return+(c/tot*100).toFixed(1);});
    return {type:'bar',data:{labels:raw.map(r=>r.n),datasets:[{type:'bar',label:'Frekuensi',data:raw.map(r=>r.v),backgroundColor:'#B2222288',borderColor:'#B22222',borderWidth:2,yAxisID:'y'},{type:'line',label:'Kumulatif %',data:pct,borderColor:'#B8860B',backgroundColor:'transparent',borderWidth:2,pointRadius:4,yAxisID:'y2'}]},options:{...chartDefaults,scales:{x:{ticks:{color:'#a08060'},grid:{color:'#2a1f0e'}},y:{beginAtZero:true,ticks:{color:'#a08060'},grid:{color:'#2a1f0e'}},y2:{position:'right',max:110,ticks:{color:'#a08060',callback:v=>v+'%'},grid:{display:false}}}}};
  }
  if(t==='radar'){
    return {type:'radar',data:{labels:[d.d1||'D1',d.d2||'D2',d.d3||'D3'],datasets:[{label:'Korelasi',data:[+d.k1||94,+d.k2||82,+d.k3||67],borderColor:'#6B3FA0',backgroundColor:'#6B3FA033',borderWidth:2,pointBackgroundColor:'#6B3FA0'}]},options:{plugins:{legend:{display:false},tooltip:{backgroundColor:'#1c1410',titleColor:'#f0e8d8',bodyColor:'#c0a870',borderColor:'#3d2e18',borderWidth:1}},scales:{r:{beginAtZero:true,max:100,ticks:{color:'#a08060',backdropColor:'transparent'},grid:{color:'#3d2e18'},pointLabels:{color:'#a08060'}}}}};
  }
  if(t==='progress'){
    const labels=[(d.a1||'Aksi 1').substring(0,22),(d.a2||'Aksi 2').substring(0,22),(d.a3||'Aksi 3').substring(0,22)];
    return {type:'bar',data:{labels,datasets:[{data:[+d.pr1||100,+d.pr2||100,+d.pr3||90],backgroundColor:'#1A4FA088',borderColor:'#1A4FA0',borderWidth:2,borderRadius:4}]},options:{...chartDefaults,indexAxis:'y',plugins:{...chartDefaults.plugins,legend:{display:false}},scales:{x:{beginAtZero:true,max:110,ticks:{color:'#a08060',callback:v=>v+'%'},grid:{color:'#2a1f0e'}},y:{ticks:{color:'#a08060'},grid:{color:'#2a1f0e'}}}}};
  }
  if(t==='comparison'){
    return {type:'bar',data:{labels:['Bulan 1','Bulan 2','Bulan 3'],datasets:[{label:'Sebelum',data:[+d.sb1||18,+d.sb2||16,+d.sb3||17],backgroundColor:'#B2222288',borderColor:'#B22222',borderWidth:2,borderRadius:4},{label:'Sesudah',data:[+d.ss1||9,+d.ss2||4,+d.ss3||0],backgroundColor:'#1A7A6E88',borderColor:'#1A7A6E',borderWidth:2,borderRadius:4}]},options:{...chartDefaults,scales:{x:{ticks:{color:'#a08060'},grid:{color:'#2a1f0e'}},y:{beginAtZero:true,ticks:{color:'#a08060'},grid:{color:'#2a1f0e'}}}}};
  }
  if(t==='pie'){
    const labels=[(d.sop1||'SOP 1').substring(0,18),(d.sop2||'SOP 2').substring(0,18),(d.sop3||'SOP 3').substring(0,18)];
    return {type:'doughnut',data:{labels,datasets:[{data:[+d.e1||96,+d.e2||91,+d.e3||85],backgroundColor:['#B8860Bcc','#C05C1Acc','#1A7A9Acc'],borderColor:['#B8860B','#C05C1A','#1A7A9A'],borderWidth:2}]},options:{plugins:{legend:{labels:{color:'#a08060',font:{size:10}}},tooltip:{backgroundColor:'#1c1410',titleColor:'#f0e8d8',bodyColor:'#c0a870',borderColor:'#3d2e18',borderWidth:1}}}};
  }
  if(t==='ranking'){
    return {type:'bar',data:{labels:[(d.t1||'T1').substring(0,14),(d.t2||'T2').substring(0,14),(d.t3||'T3').substring(0,14)],datasets:[{data:[+d.s1||88,+d.s2||74,+d.s3||63],backgroundColor:['#1A7A9Acc','#1A4FA0cc','#6B3FA0cc'],borderColor:['#1A7A9A','#1A4FA0','#6B3FA0'],borderWidth:2,borderRadius:6}]},options:{...chartDefaults,plugins:{...chartDefaults.plugins,legend:{display:false}},scales:{x:{ticks:{color:'#a08060'},grid:{color:'#2a1f0e'}},y:{beginAtZero:true,max:110,ticks:{color:'#a08060'},grid:{color:'#2a1f0e'}}}}};
  }
  return null;
}

  const cards = stats.map(s=>`<div class="stat-card" style="border:1px solid ${s.color}33"><div style="font-size:28px;margin-bottom:8px">${s.icon}</div><div class="stat-num" style="color:${s.color}">${s.value}</div><div class="stat-label">${s.label}</div></div>`).join('');
  const projRows = STATE.projects.map(p=>{
    const done=Object.keys(p.content||{}).length;
    const dots=STEPS.map((s,i)=>`<div style="width:12px;height:12px;border-radius:3px;background:${p.content?.[s.id]?STEP_COLORS[i]:'#2a1f0e'}"></div>`).join('');

  return `

    ${STATE.projects.length?`<div style="display:flex;flex-direction:column;gap:10px">${projRows}</div>`:'<div style="color:#3d2e18;font-family:monospace;font-size:11px">Belum ada proyek</div>'}
  </div>`;
}

function previewPDF(){
  const overlay = document.getElementById('pdf-preview-overlay');
  const doc = document.getElementById('pdf-doc');
  if(!overlay||!doc) return;

  doc.innerHTML = `
    <!-- Close bar -->
    <div class="pdf-close-bar">
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:18px">📄</span>
        <div>
          <div style="font-family:monospace;font-size:9px;color:#B8860B;letter-spacing:2px">PREVIEW MAKALAH</div>
          <div style="font-size:13px;color:#fff;font-weight:600">${getProject().name||'Proyek'}</div>
        </div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn" style="background:linear-gradient(135deg,#B22222,#8a1a1a);color:#fff;padding:7px 16px;font-size:10px;font-family:monospace;letter-spacing:1.5px;font-weight:700" onclick="printPDF()">🖨 CETAK / SIMPAN PDF</button>
        <button class="btn btn-ghost" style="padding:7px 14px;font-size:13px" onclick="closePDFPreview()">✕ TUTUP</button>
      </div>
    </div>
    <!-- Document content -->
    <div>${buildPDFHtml()}</div>`;

  overlay.classList.add('show');
  overlay.scrollTop = 0;
}

function closePDFPreview(){
  document.getElementById('pdf-preview-overlay')?.classList.remove('show');
}

function printPDF(){
  const overlay = document.getElementById('pdf-preview-overlay');
  const doc = document.getElementById('pdf-doc');
  if(!doc) return;

  // Build content if not already previewed
  if(!overlay?.classList.contains('show')){
    doc.innerHTML = '<div>' + buildPDFHtml() + '</div>';
    overlay?.classList.add('show');
    setTimeout(()=>window.print(), 300);
  } else {
    window.print();
  }
}

// Close preview on Escape key
document.addEventListener('keydown', e=>{
  if(e.key==='Escape') closePDFPreview();
});

// SYNC — encode/decode user list into shareable code
// ═══════════════════════════════════════════════════
function encodeUsers(users){
  try{ return btoa(unescape(encodeURIComponent(JSON.stringify(users)))); }
  catch{ return ''; }
}
function decodeUsers(code){
  try{ return JSON.parse(decodeURIComponent(escape(atob(code.trim())))); }
  catch{ return null; }
}

// Check URL for embedded sync code: ?sync=BASE64
function checkURLSync(){
  try{
    const params = new URLSearchParams(window.location.search);
    const code = params.get('sync');
    if(!code) return false;
    const decoded = decodeUsers(code);
    if(!decoded || !Array.isArray(decoded) || decoded.length===0) return false;
    // Merge: keep existing users, add new ones from code
    const existing = load(KEYS.users, []);
    let merged = [...existing];
    decoded.forEach(u=>{
      if(!merged.find(x=>x.id===u.id)){
        merged.push(u);
      } else {
        // Update existing user data (in case password changed)
        merged = merged.map(x=>x.id===u.id ? {...x,...u} : x);
      }
    });
    save(KEYS.users, merged);
    // Clean URL
    window.history.replaceState({}, document.title, window.location.pathname);
    return true;
  } catch(e){ return false; }
}

// Generate sync link for admin to share
// ═══════════════════════════════════════════════════
// EXPORT / IMPORT PROYEK antar perangkat
// ═══════════════════════════════════════════════════

  <div class="modal-header">
    <div><div style="font-family:monospace;font-size:9px;letter-spacing:3px;color:#1A7A6E;margin-bottom:2px">BAGIKAN PROYEK KE USER</div>

    <button class="btn btn-ghost" style="padding:4px 10px;font-size:13px" onclick="closeModal()">✕</button>
  </div>
  <div class="modal-body">
    <div style="background:#071a12;border:1px solid #1A7A6E44;border-radius:10px;padding:14px 16px;margin-bottom:16px">
      <div style="font-family:monospace;font-size:9px;color:#1A7A6E;letter-spacing:2px;margin-bottom:6px">💡 CARA PENGGUNAAN:</div>

        onclick="copyProjLink()">📋 Salin</button>
    </div>
    <div id="proj-copy-confirm" style="font-family:monospace;font-size:9px;color:#1A7A6E;margin-top:4px;display:none">✓ Link berhasil disalin!</div>
    <div style="margin-top:14px;padding:10px 12px;background:#1a1207;border:1px solid #B8860B33;border-radius:8px;font-family:monospace;font-size:9px;color:#c0a030;line-height:1.7">
      <strong>Proyek yang disertakan:</strong><br>

  </div>`);

function copyProjLink(){
  const inp = document.getElementById('proj-sync-input');
  if(!inp) return;
  navigator.clipboard?.writeText(inp.value).then(()=>{
    const el=document.getElementById('proj-copy-confirm');
    if(el){el.style.display='block';setTimeout(()=>el.style.display='none',3000);}
  }).catch(()=>{inp.select();document.execCommand('copy');});
}

function showImportProject(){
  openModal(`
  <div class="modal-header">
    <div><div style="font-family:monospace;font-size:9px;letter-spacing:3px;color:#1A7A6E;margin-bottom:2px">IMPORT PROYEK DARI ADMIN</div>
    <div style="font-size:14px;font-weight:700;color:#f0e8d8">Tempel Kode Proyek</div></div>
    <button class="btn btn-ghost" style="padding:4px 10px;font-size:13px" onclick="closeModal()">✕</button>
  </div>
  <div class="modal-body">
    <div style="background:#071a12;border:1px solid #1A7A6E44;border-radius:10px;padding:12px 14px;margin-bottom:16px;font-family:monospace;font-size:10px;color:#5a8a70;line-height:1.6">
      💡 Minta admin untuk klik <strong style="color:#c0f0d0">"🔗 Bagikan Proyek"</strong> lalu kirim link ke Anda.<br>
      Atau tempel kode proyek di bawah ini:
    </div>
    <div class="form-group"><label class="form-label">Kode Proyek (dari Admin)</label>
      <textarea id="import-code" class="form-input mono" rows="3" placeholder="Tempel kode atau link di sini..."
        style="resize:vertical;font-size:10px;letter-spacing:0;line-height:1.5"></textarea></div>
    <div id="import-err" style="display:none" class="error-box"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-full" onclick="closeModal()">BATAL</button>
      <button class="btn btn-full btn-lg" style="background:linear-gradient(135deg,#1A7A6E,#0f5c52);color:#fff;border:none" onclick="doImportProject()">📥 IMPORT PROYEK</button>
    </div>
  </div>`);
}
function doImportProject(){
  let raw = (document.getElementById('import-code')?.value||'').trim();
  const errEl = document.getElementById('import-err');
  function showErr(m){if(errEl){errEl.textContent=m;errEl.style.display='block';}}
  // Support full URL or just the code
  if(raw.includes('?projects=')) raw = raw.split('?projects=')[1].split('&')[0];
  try{
    const decoded = JSON.parse(decodeURIComponent(escape(atob(raw))));
    if(!Array.isArray(decoded)||decoded.length===0){ showErr('Kode tidak valid.'); return; }
    let merged = [...STATE.projects];
    let added = 0, updated = 0;
    decoded.forEach(p=>{
      const idx = merged.findIndex(x=>x.id===p.id);
      if(idx<0){ merged.push(p); added++; }
      else { merged[idx]={...merged[idx],...p}; updated++; }
    });
    STATE.projects = merged;
    save(KEYS.projects, STATE.projects);
    closeModal();
    renderDashboard();
    showToast((added?added+' proyek ditambahkan':'')+(updated?' '+updated+' diperbarui':''));
  } catch(e){ showErr('Kode tidak valid atau sudah kadaluarsa. Minta link baru dari admin.'); }
}

// Check URL for project sync code
function checkURLProjectSync(){
  try{
    const params = new URLSearchParams(window.location.search);
    const code = params.get('projects');
    if(!code) return false;
    const decoded = JSON.parse(decodeURIComponent(escape(atob(code.trim()))));
    if(!decoded||!Array.isArray(decoded)) return false;
    let merged = [...load(KEYS.projects,[])];
    let added=0, updated=0;
    decoded.forEach(p=>{
      const idx=merged.findIndex(x=>x.id===p.id);
      if(idx<0){merged.push(p);added++;}
      else{merged[idx]={...merged[idx],...p};updated++;}
    });
    save(KEYS.projects, merged);
    window.history.replaceState({}, document.title, window.location.pathname);
    if(added||updated) showToast((added?added+' proyek berhasil diimport':'')+(updated?' '+updated+' diperbarui':''));
    return true;
  } catch{ return false; }
}

  const code = encodeUsers(users);
  const link = window.location.origin + window.location.pathname + '?sync=' + code;
  openModal(`
  <div class="modal-header">
    <div><div style="font-family:monospace;font-size:9px;letter-spacing:3px;color:#1A7A6E;margin-bottom:2px">BAGIKAN AKSES USER</div>

    <button class="btn btn-ghost" style="padding:4px 10px;font-size:13px" onclick="closeModal()">✕</button>

  <div class="modal-body">
    <div style="background:#071a12;border:1px solid #1A7A6E44;border-radius:10px;padding:14px 16px;margin-bottom:16px">
      <div style="font-family:monospace;font-size:9px;color:#1A7A6E;letter-spacing:2px;margin-bottom:6px">💡 CARA PENGGUNAAN:</div>
      <div style="font-size:11px;color:#5a8a70;line-height:1.7">
        1. Klik <strong style="color:#c0f0d0">Salin Link</strong> di bawah<br>
        2. Kirim link tersebut ke user via WhatsApp/email<br>
        3. User buka link itu di browser mereka<br>
        4. Data akun otomatis tersimpan, langsung bisa login<br>
        <span style="color:#3a6a50">⚠ Link ini berisi semua data akun user (${users.length} user)</span>
      </div>
    </div>
    <label class="form-label">Link Sinkronisasi</label>
    <div style="display:flex;gap:8px;margin-bottom:4px">
      <input id="sync-link-input" class="form-input mono" style="font-size:9px;letter-spacing:0" 
        value="${link}" readonly onclick="this.select()"/>
      <button class="btn btn-gold" style="white-space:nowrap;padding:8px 14px;font-size:10px" 
        onclick="copySyncLink()">📋 Salin</button>
    </div>
    <div id="copy-confirm" style="font-family:monospace;font-size:9px;color:#1A7A6E;margin-top:6px;display:none">✓ Link berhasil disalin!</div>
    <div style="margin-top:16px;padding:10px 12px;background:#1a1207;border:1px solid #B8860B33;border-radius:8px;font-family:monospace;font-size:9px;color:#c0a030;line-height:1.6">
      <strong>User yang disertakan (${users.length}):</strong><br>
      ${users.map(u=>`• ${u.name} (@${u.username})`).join('<br>')}

function copySyncLink(){
  const inp = document.getElementById('sync-link-input');
  if(!inp) return;
  navigator.clipboard?.writeText(inp.value).then(()=>{
    const el = document.getElementById('copy-confirm');

}

// ═══════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════
initState();

// Process sync from URL first (users)
const wasSynced = checkURLSync();
if(wasSynced){
  STATE.users = load(KEYS.users, []);
  showToast('✓ Data akun berhasil disinkronkan!');
}
// Process project sync from URL
checkURLProjectSync();
STATE.projects = load(KEYS.projects, []);

if(STATE.session){
  const freshUsers = load(KEYS.users,[]);
  const valid = freshUsers.find(u=>u.id===STATE.session.id&&u.password===STATE.session.password);
  if(valid){ STATE.session=valid; STATE.users=freshUsers; navigate('dashboard'); }
  else { STATE.session=null; save(KEYS.session,null); navigate('login'); }
} else {
  navigate('login');
}
</script>
